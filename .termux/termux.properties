# https://wiki.termux.com/wiki/Terminal_Settings
# remember `termux-reload-settings`

# scrollback buffer
terminal-transcript-rows = 2048
volume-keys = volume
terminal-cursor-blink-rate = 0
extra-keys = [\
	['DEL','ESC','SHIFT','HOME','UP','END','PGUP'],\
	['TAB','CTRL','ALT','LEFT','DOWN','RIGHT','PGDN']\
]
